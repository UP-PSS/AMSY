<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; padding: 20px; }
        .card { max-width: 760px; margin: 0 auto; background: #fff; border-radius: 18px; border: 1px solid #e2e8f0; box-shadow: 0 8px 24px rgba(15,23,42,.08); overflow: hidden; }
        .head { background: #531C79; color: #fff; padding: 22px; display: flex; align-items: center; gap: 16px; }
        .avatar { width: 76px; height: 76px; min-width: 76px; border-radius: 50%; overflow: hidden; background: rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; font-weight: 800; font-size: 1.3rem; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .title h1 { font-size: 1.35rem; font-weight: 800; }
        .title p { font-size: .85rem; opacity: .9; margin-top: 3px; }
        .content { padding: 22px; display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
        .item { background:#f8fafc; border:1px solid #e2e8f0; border-radius: 12px; padding: 12px; }
        .label { font-size: .72rem; color: #64748b; text-transform: uppercase; font-weight: 800; letter-spacing: .04em; margin-bottom: 6px; }
        .value { font-size: .95rem; font-weight: 600; word-break: break-word; }
        .status { max-width:760px; margin: 20px auto; text-align:center; color:#64748b; }
        .status.error { color: #dc2626; }
    </style>
</head>
<body>
    <div id="status" class="status">Loading profile...</div>
    <section id="profileCard" class="card" style="display:none;">
        <header class="head">
            <div class="avatar" id="avatar">--</div>
            <div class="title">
                <h1 id="full_name">Applicant</h1>
                <p id="batchLine">Batch: -</p>
            </div>
        </header>
        <div class="content">
            <div class="item"><div class="label">full_name</div><div class="value" id="field_full_name">-</div></div>
            <div class="item"><div class="label">Batch</div><div class="value" id="field_batch">-</div></div>
            <div class="item"><div class="label">Sponsor</div><div class="value" id="field_sponsor">-</div></div>
            <div class="item"><div class="label">Picture</div><div class="value" id="field_picture">-</div></div>
            <div class="item"><div class="label">Facebook</div><div class="value" id="field_facebook">-</div></div>
            <div class="item"><div class="label">code</div><div class="value" id="field_code">-</div></div>
        </div>
    </section>

    <script>
        const SUPABASE_URL = 'https://havsuikahafqciurmaeq.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_pNAu0cwHGyX2Pn_DlX71Og_-t1KZq6C';
        const DEFAULT_AVATAR_URL = 'https://i.ibb.co/XZ4PZk67/icon-1.png';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function getUserProfile() {
            const sessionProfile = sessionStorage.getItem('userProfile');
            const localProfile = localStorage.getItem('userProfile');
            return sessionProfile ? JSON.parse(sessionProfile) : localProfile ? JSON.parse(localProfile) : null;
        }

        function initialsFromName(name) {
            return (name || 'U').split(' ').map(part => part[0]).join('').toUpperCase().slice(0, 2);
        }

        function setAvatar(name, pictureUrl) {
            const avatar = document.getElementById('avatar');
            if (!avatar) return;
            if (pictureUrl) {
                avatar.innerHTML = `<img src="${pictureUrl}" alt="Avatar" onerror="this.src='${DEFAULT_AVATAR_URL}'">`;
            } else {
                avatar.textContent = initialsFromName(name);
            }
        }

        function fieldValue(row, keys) {
            for (const key of keys) {
                if (row && row[key] !== undefined && row[key] !== null && row[key] !== '') return row[key];
            }
            return '';
        }

        async function loadProfile() {
            const status = document.getElementById('status');
            const card = document.getElementById('profileCard');
            const profile = getUserProfile();
            const fullName = profile?.userName || '';

            if (!fullName) {
                status.className = 'status error';
                status.textContent = 'User session not found. Please log in again.';
                return;
            }

            const queries = [
                supabaseClient.from('Applicants').select('full_name, Batch, Sponsor, Picture, Facebook, code').eq('full_name', fullName).maybeSingle(),
                supabaseClient.from('Applicants').select('full_name, Batch, Sponsor, Picture, Facebook, code').eq('name', fullName).maybeSingle(),
                supabaseClient.from('Applicants').select('full_name, Batch, Sponsor, Picture, Facebook, code').ilike('full_name', fullName).maybeSingle()
            ];

            let row = null;
            for (const query of queries) {
                const { data, error } = await query;
                if (!error && data) {
                    row = data;
                    break;
                }
            }

            if (!row) {
                status.className = 'status error';
                status.textContent = 'No applicant record found in Supabase.';
                return;
            }

            const name = fieldValue(row, ['full_name', 'name']) || fullName;
            const batch = fieldValue(row, ['Batch', 'batch']) || '-';
            const sponsor = fieldValue(row, ['Sponsor', 'sponsor']) || '-';
            const picture = fieldValue(row, ['Picture', 'picture']) || DEFAULT_AVATAR_URL;
            const facebook = fieldValue(row, ['Facebook', 'facebook']) || '-';
            const code = fieldValue(row, ['code', 'Code']) || '-';

            document.getElementById('full_name').textContent = name;
            document.getElementById('batchLine').textContent = `Batch: ${batch}`;
            document.getElementById('field_full_name').textContent = name;
            document.getElementById('field_batch').textContent = batch;
            document.getElementById('field_sponsor').textContent = sponsor;
            document.getElementById('field_picture').innerHTML = `<a href="${picture}" target="_blank" rel="noopener noreferrer">${picture}</a>`;
            document.getElementById('field_facebook').innerHTML = facebook === '-' ? '-' : `<a href="${facebook}" target="_blank" rel="noopener noreferrer">${facebook}</a>`;
            document.getElementById('field_code').textContent = code;
            setAvatar(name, picture);

            status.style.display = 'none';
            card.style.display = 'block';
        }

        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>
