<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPLB AMIS Schedule Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        :root {
            --primary: #531C79;
            --border: #E2E8F0;
            --text: #1E293B;
            --free-bg: #F3E5F5;
            --blocked-red: #BE4AAD;
            --reschedule-green: #2FB344;
            --initials-green: #49A631;
            --glow-v: rgba(83, 28, 121, 0.4);
            --glow-g: rgba(47, 179, 68, 0.35);
            --time-col-width: 80px;
        }
        body { font-family: 'Inter', sans-serif; background: #F8FAFC; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: var(--text); -webkit-font-smoothing: antialiased; }

        body.reschedule-mode-active { box-shadow: inset 0 0 0 8px var(--reschedule-green), 0 0 25px var(--glow-g); }

        .title-band { background: #F1F5F9; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 22px 0 18px; }
        .app-title { color: var(--primary); font-size: clamp(32px, 6vw, 50px); font-weight: 900; text-align: center; margin: 0; letter-spacing: -2px; text-transform: uppercase; }
        .mode-banner { color: var(--primary); font-size: 12px; font-weight: 800; text-align: center; margin: 10px 0 0; display: none; letter-spacing: 0.2em; }
        body.reschedule-mode-active .mode-banner { display: block; color: var(--reschedule-green); }
        .table-container { flex-grow: 1; background: white; overflow: auto; width: 100%; -webkit-overflow-scrolling: touch; touch-action: pan-x pan-y; overscroll-behavior: contain; }
        table { width: 100%; border-collapse: separate; border-spacing: 3px; min-width: 850px; table-layout: fixed; }


        thead th {
            position: sticky;
            top: 0;
            background: white;
            padding: 8px 0;
            font-size: 13px;
            font-weight: 900;
            color: var(--primary);
            border-bottom: none;
            z-index: 10;
            cursor: pointer;
            transition: all 0.2s;
        }

        thead th:not(:first-child),
        tbody td:not(:first-child) {
            width: calc((100% - var(--time-col-width)) / 7);
        }

        thead th:not(:first-child):hover {
            background: #F3E5F5;
            color: var(--primary);
        }

        .time-col {
            position: sticky;
            left: 0;
            background: #FFFFFF;
            z-index: 11;
            text-align: center;
            font-size: 10px;
            font-weight: 600;
            color: var(--primary);
            padding: 0 4px !important;
            line-height: 1.35;
            white-space: nowrap;
            box-sizing: border-box;
            width: var(--time-col-width);
            min-width: var(--time-col-width);
            max-width: var(--time-col-width);
        }

        .time-label {
            display: block;
        }

        .time-start {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
        }

        .time-end {
            font-size: 10px;
            color: #64748b;
            margin-top: -1px;
        }

        .time-separator {
            display: inline-block;
            margin: 0 4px;
            color: #94a3b8;
        }

        td { padding: 0; border-bottom: none; }
        .slot {
            width: 100%;
            min-height: 45px;
            height: 45px;
            background: #FAFAFA;
            border-radius: 4px;
            border: 1px solid #EDF2F7;
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            padding: 4px 5px;
            align-content: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 500;
            box-sizing: border-box;
            transition: 0.1s;
            position: relative;
            touch-action: pan-x pan-y;
        }
        .slot.available { background: var(--free-bg) !important; border-color: #EDF2F7; color: var(--primary); cursor: pointer; }
        .slot.locked { background: #FCE4EC !important; border-color: var(--blocked-red); cursor: pointer; }
        .slot.source-selected { outline: 3px solid var(--reschedule-green); outline-offset: -3px; background: #ECFDF3 !important; }

        body.edit-mode-active .slot.available,
        body.edit-mode-active .slot.locked {
            cursor: grab;
        }

        body.edit-mode-active .slot.available:active,
        body.edit-mode-active .slot.locked:active {
            cursor: grabbing;
        }

        .initials-row { width: 100%; display: flex; align-items: center; justify-content: center; gap: 2px; flex-wrap: nowrap; overflow: hidden; padding-bottom: 10px; }
        .initials-badge { background: var(--initials-green) !important; color: white !important; font-size: 9px; font-weight: 700; padding: 2px 3px; border-radius: 3px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); white-space: nowrap; pointer-events: none; min-width: 0; max-width: 16%; overflow: hidden; text-overflow: clip; text-align: center; flex: 1 1 0; }
        .location-tag { width: calc(100% - 8px); color: var(--primary); font-size: 8px; font-weight: 700; position: absolute; left: 50%; bottom: 2px; transform: translateX(-50%); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; line-height: 1.1; }
        .mobile-count { display: none; position: absolute; top: 2px; right: 4px; font-size: 10px; font-weight: 800; color: var(--primary); line-height: 1; }
        .slot.drag-target { outline: 2px dashed var(--reschedule-green); outline-offset: -2px; }

        #location-picker { position: fixed; background: white; border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 20000; display: none; padding: 8px; min-width: 170px; max-height: 300px; overflow-y: auto; }
        .loc-option { padding: 10px 14px; font-size: 13px; color: #334155; cursor: pointer; border-radius: 6px; font-weight: 600; transition: all 0.2s; }
        .loc-option:hover { background: #F1F5F9; color: var(--primary); }

        #confirm-dialog {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            z-index: 30000;
            padding: 24px;
            min-width: 320px;
            max-width: 400px;
        }

        #confirm-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 29999;
        }

        #details-dialog {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            z-index: 30001;
            padding: 20px;
            min-width: 300px;
            max-width: 420px;
            width: min(92vw, 460px);
        }

        .details-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .dialog-close-x {
            border: 1px solid #CBD5E1;
            background: #fff;
            color: #64748b;
            width: 30px;
            height: 30px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            line-height: 1;
            padding: 0;
            flex-shrink: 0;
        }

        #qr-dialog {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            z-index: 30002;
            padding: 20px;
            width: min(92vw, 460px);
        }

        #qr-reader {
            width: 100%;
            min-height: 260px;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            overflow: hidden;
            background: #F8FAFC;
        }

        .details-meta {
            display: grid;
            gap: 10px;
            padding: 12px;
            border: 1px solid #E2E8F0;
            border-radius: 10px;
            background: #F8FAFC;
        }

        .details-label {
            font-size: 12px;
            font-weight: 800;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 4px;
        }

        .details-value {
            color: #0F172A;
            font-size: 14px;
            font-weight: 600;
        }

        .details-applicants {
            margin-top: 12px;
            border: 1px solid #E2E8F0;
            border-radius: 10px;
            padding: 12px;
            background: #fff;
            max-height: 170px;
            overflow-y: auto;
        }

        .details-applicant-item {
            padding: 7px 8px;
            border-radius: 8px;
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            font-size: 13px;
            font-weight: 700;
            color: #0F172A;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .details-applicant-main {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .details-applicant-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #CBD5E1;
            flex-shrink: 0;
            background: #E2E8F0;
        }

        .details-applicant-avatar-fallback {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid #CBD5E1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 800;
            color: var(--primary);
            background: #fff;
            flex-shrink: 0;
        }

        .details-applicant-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .details-applicant-remove {
            border: 1px solid #FCA5A5;
            color: #DC2626;
            background: #fff;
            border-radius: 999px;
            width: 22px;
            height: 22px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 800;
            line-height: 1;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .details-notes {
            margin-top: 12px;
        }

        .details-notes textarea,
        #slot-location-select {
            width: 100%;
            margin-top: 6px;
            padding: 10px;
            border: 1px solid #CBD5E1;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            box-sizing: border-box;
        }

        #details-dialog .dialog-message {
            margin-bottom: 10px;
        }

        .dialog-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .dialog-message {
            font-size: 14px;
            color: #475569;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .dialog-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .dialog-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dialog-btn-cancel {
            background: #E2E8F0;
            color: #475569;
        }

        .dialog-btn-cancel:hover {
            background: #CBD5E1;
        }

        .dialog-btn-confirm {
            background: #BE4AAD;
            color: white;
        }

        .dialog-btn-confirm:hover {
            background: #9C3C8D;
        }

        .toggle-lock-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border);
            background: #fff;
            color: #334155;
            border-radius: 999px;
            padding: 7px 12px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
        }

        .toggle-lock-indicator {
            width: 34px;
            height: 18px;
            border-radius: 999px;
            background: #cbd5e1;
            position: relative;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .toggle-lock-indicator::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.25);
            transition: left 0.2s;
        }

        .toggle-lock-btn.active {
            border-color: var(--blocked-red);
            color: var(--blocked-red);
            background: #FDF2F8;
        }

        .toggle-lock-btn.active .toggle-lock-indicator {
            background: var(--blocked-red);
        }

        .toggle-lock-btn.active .toggle-lock-indicator::after {
            left: 18px;
        }

        .controls-bar {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            background: #fff;
        }

        .controls-panel {
            border-bottom: 1px solid var(--border);
            background: #fff;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
        }

        .panel-title {
            font-size: 11px;
            font-weight: 900;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .collapse-toggle {
            border: 1px solid var(--border);
            background: #fff;
            color: var(--primary);
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
        }

        .controls-panel.collapsed #scheduleControls {
            display: none;
        }

        .action-card {
            border: 2px solid var(--border);
            background: #fff;
            color: var(--primary);
            border-radius: 20px;
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 150px;
        }

        .action-card:hover {
            border-color: var(--primary);
            background: #F3E5F5;
            transform: translateY(-1px);
        }

        #reschedBtn.action-card.active {
            background: #ECFDF3;
            border-color: var(--reschedule-green);
            color: var(--reschedule-green);
        }

        @media (min-width: 641px) and (max-width: 1024px) and (orientation: portrait) {
            .slot { min-height: 85px; height: 85px; }
            :root { --time-col-width: 75px; }
            .time-start { font-size: 12px; }
        }

        @media (max-width: 640px) {
            body { overflow: auto; }
            .table-container { overflow: auto; }
            table { min-width: 0; width: 100%; border-spacing: 1px; }
            thead th { font-size: 9px; padding: 4px 0; }
            :root { --time-col-width: 48px; }
            .time-col { font-size: 9px; padding: 0 2px !important; }
            .time-start { font-size: 9px; line-height: 1.1; }
            .time-end { font-size: 7px; }
            td { padding: 0; }
            .slot { height: auto; min-height: 0; aspect-ratio: 1 / 1; padding: 0; gap: 0; border-radius: 2px; font-size: 0; }
            .slot .initials-row { display: none !important; }
            .slot .mobile-count { display: block; }
            .slot .location-tag { display: block !important; width: calc(100% - 4px); font-size: 7px; font-weight: 700; bottom: 1px; }
            .title-band { padding: 16px 0 14px; }
            .controls-bar { padding: 12px; gap: 8px; flex-wrap: wrap; }
            .panel-header { padding: 8px 12px; }
            .action-card { min-width: 138px; }
            #details-dialog { min-width: 85vw; }
        }

        #toast {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translate(-50%, -12px);
            background: linear-gradient(135deg, #531C79, #BE4AAD);
            color: white;
            padding: 12px 22px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            display: block;
            opacity: 0;
            pointer-events: none;
            z-index: 10000;
            box-shadow: 0 12px 30px rgba(83, 28, 121, 0.35);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        #toast.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            z-index: 25000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        #loading-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .loading-spinner {
            width: 46px;
            height: 46px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        .loading-text {
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.4px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .slot.missing-class {
            background: #FEF3C7 !important;
            border-color: #F59E0B;
            box-shadow: inset 0 0 0 1px rgba(245, 158, 11, 0.2);
        }

        #csv-upload, #json-upload { display: none; }

        .maintenance-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 26000;
            padding: 20px;
        }

        .maintenance-card {
            background: white;
            border-radius: 20px;
            padding: 28px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.2);
        }

        .maintenance-card h2 {
            color: var(--primary);
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .maintenance-card p {
            color: #64748b;
            font-size: 13px;
            line-height: 1.6;
        }
    </style>
</head>
<body id="mainBody">

    <div id="location-picker"></div>
    <div class="maintenance-overlay" id="maintenanceOverlay">
        <div class="maintenance-card">
            <h2>Website Under Maintenance</h2>
            <p>The portal is currently under maintenance. Please check back later.</p>
        </div>
    </div>
    <div id="confirm-overlay"></div>
    <div id="qr-dialog">
        <div class="dialog-title">Scan QR Code</div>
        <div class="dialog-message">Scan an applicant QR code.</div>
        <div id="qr-reader"></div>
        <div class="dialog-actions" style="margin-top:12px;">
            <button class="dialog-btn dialog-btn-cancel" onclick="closeQrScanner()">Close</button>
        </div>
    </div>
    <div id="details-dialog">
        <div class="details-header">
            <div class="dialog-title" style="margin-bottom:0;">Slot Details</div>
            <button class="dialog-close-x" onclick="closeDetailsDialog()" aria-label="Close slot details">×</button>
        </div>
        <div class="dialog-message" id="details-message">-</div>
    </div>
    <div id="confirm-dialog">
        <div class="dialog-title" id="dialog-title">Confirm Action</div>
        <div class="dialog-message" id="dialog-message">Are you sure?</div>
        <div class="dialog-actions">
            <button class="dialog-btn dialog-btn-cancel" onclick="closeDialog()">Cancel</button>
            <button class="dialog-btn dialog-btn-confirm" id="dialog-confirm">Confirm</button>
        </div>
    </div>
    <div class="title-band">
        <h1 class="app-title">SCHEDULE</h1>
        <div class="mode-banner" id="modeBanner">RESCHEDULE MODE</div>
    </div>
    <div id="toast"></div>
    <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Processing schedule...</div>
    </div>

    <div class="controls-panel" id="controlsPanel">
        <div class="panel-header">
            <span class="panel-title">Actions</span>
            <button class="collapse-toggle" id="controlsToggleBtn" onclick="toggleControlsPanel()">Hide</button>
        </div>
        <div class="controls-bar" id="scheduleControls">
            <button class="action-card" onclick="toggleEditMode()" id="editBtn">✍️ Edit Mode</button>
            <button class="action-card" onclick="triggerCSVUpload()">📄 Upload CSV</button>
            <button class="action-card" onclick="toggleRescheduleMode()" id="reschedBtn">🔄 Reschedule</button>
            <button class="action-card" onclick="openQrScanner()">📷 Scan QR Code</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>TIME SLOT</th>
                    <th onclick="handleDayClick('Sunday')">SUN</th>
                    <th onclick="handleDayClick('Monday')">MON</th>
                    <th onclick="handleDayClick('Tuesday')">TUE</th>
                    <th onclick="handleDayClick('Wednesday')">WED</th>
                    <th onclick="handleDayClick('Thursday')">THU</th>
                    <th onclick="handleDayClick('Friday')">FRI</th>
                    <th onclick="handleDayClick('Saturday')">SAT</th>
                </tr>
            </thead>
            <tbody id="grid"></tbody>
        </table>
    </div>

    <input type="file" id="csv-upload" accept=".csv" onchange="handleCSVUpload(event)">

    <script>
        // Get current user name from stored data
        function getCurrentUserName() {
            // Try sessionStorage first, then localStorage
            const sessionProfile = sessionStorage.getItem('userProfile');
            const localProfile = localStorage.getItem('userProfile');

            let userProfile = null;
            if (sessionProfile) {
                userProfile = JSON.parse(sessionProfile);
            } else if (localProfile) {
                userProfile = JSON.parse(localProfile);
            }

            if (userProfile) {
                return userProfile.userName || 'Resident';
            }

            // Fallback
            return "Juan";
        }

        function toFirebaseKey(value) {
            return (value || '').replace(/[.#$\[\]]/g, '_');
        }

        // Comprehensive user profile access function
        function getUserProfile() {
            const sessionProfile = sessionStorage.getItem('userProfile');
            const localProfile = localStorage.getItem('userProfile');
            const userProfile = sessionProfile ? JSON.parse(sessionProfile) : localProfile ? JSON.parse(localProfile) : null;

        function formatSlotForStorage(slotId) {
            if (!slotId) return slotId;
            const isLocked = slotId.includes("(/)");
            const clean = slotId.replace("(/)", "").replace("(u)", "");
            const parts = clean.split('-');
            if (parts.length < 2) return slotId;
            const [day, timeKey] = parts;
            const timeSlot = TIME_SLOTS.find(slot => slot.id === timeKey);
            if (!timeSlot) return slotId;
            const dayLabel = (DAY_NAME_LOOKUP[day.toUpperCase()] || day).toUpperCase();
            const display = `${dayLabel} - ${timeSlot.start}`;
            return isLocked ? `${display}(/)` : display;
        }

        // Used only for comparison, not display or storage
        function compactTimeLabel(timeLabel) {
            return (timeLabel || '').replace(/\s+/g, '');
        }

        function parseStoredSlotValue(value) {
            if (!value) return value;
            const isLocked = value.includes("(/)");
            const isAutoLocked = value.includes("(u)");
            const clean = value.replace("(/)", "").replace("(u)", "").trim();
            if (clean.includes(' - ')) {
                const [dayLabel, timeLabel] = clean.split(' - ').map(part => part.trim());
                const dayName = DAY_NAME_LOOKUP[dayLabel.toUpperCase()] || dayLabel;
                // Support both "8:00 AM" (new) and "8:00AM" (old compact) formats
                const slot = TIME_SLOTS.find(time =>
                    compactTimeLabel(time.start).toUpperCase() === compactTimeLabel(timeLabel).toUpperCase()
                );
                if (dayName && slot) {
                    return `${dayName}-${slot.id}${isLocked ? "(/)" : isAutoLocked ? "(u)" : ""}`;
                }
            }
            return value;
        }

        function normalizeSlotId(slotId) {
            if (!slotId) return '';
            const parsed = parseStoredSlotValue(slotId);
            const clean = (parsed || slotId).replace("(/)", "").replace("(u)", "").trim();
            if (clean.includes('-')) {
                const [dayRaw, timeRaw] = clean.split('-');
                const dayName = DAY_NAME_LOOKUP[(dayRaw || '').trim().toUpperCase()] || (dayRaw || '').trim();
                const compactTime = (timeRaw || '').replace(/[:\s]/g, '').toUpperCase();
                const knownSlot = TIME_SLOTS.find(slot => slot.id.toUpperCase() === compactTime);
                if (dayName && knownSlot) {
                    return `${dayName}-${knownSlot.id}`;
                }
            }
            return clean.replace(/[:\s]/g, '');
        }

        function serializeAvailableSlots(slots) {

        function getApprovedCountsBySlot(requestsMap) {
            const counts = {};
            const normalizedCurrentResident = normalizeTextValue(CURRENT_USER_NAME);
            Object.values(requestsMap || {}).forEach(reqRaw => {
                const req = normalizeRequest(reqRaw);
                const residentMatches = normalizeTextValue(req.resident) === normalizedCurrentResident;
                const isApproved = normalizeTextValue(req.status) === 'approved';
                if (!residentMatches || !isApproved || !req.slotIds.length) return;
                req.slotIds.forEach(slotId => {
                    const cleanId = normalizeSlotId(slotId);
                    counts[cleanId] = (counts[cleanId] || 0) + 1;
                });
            });
            return counts;
        }

        function getSlotsFromApprovalTransitions(previousRequests, nextRequests) {
            const approvedSlots = new Set();
            const normalizedCurrentResident = normalizeTextValue(CURRENT_USER_NAME);

            Object.keys(nextRequests || {}).forEach(key => {
                const prevReq = normalizeRequest((previousRequests || {})[key]);
                const nextReq = normalizeRequest(nextRequests[key]);

                const prevStatus = normalizeTextValue(prevReq.status);
                const nextStatus = normalizeTextValue(nextReq.status);
                const residentMatches = normalizeTextValue(nextReq.resident) === normalizedCurrentResident;

                if (!residentMatches) return;
                if (prevStatus === 'approved' || nextStatus !== 'approved') return;

                nextReq.slotIds.forEach(slotId => {
                    approvedSlots.add(normalizeSlotId(slotId));
                });
            });

            return approvedSlots;
        }

        async function lockSlotsFromApprovalEvent(approvedSlots, requestsSnapshot) {
            if (!approvedSlots || !approvedSlots.size) return;

            const resolvedQuota = Number.isFinite(USER_QUOTA) && USER_QUOTA > 0 ? USER_QUOTA : 3;
            const activeQuota = isQuotaLoaded ? resolvedQuota : 3;
            const approvedCounts = getApprovedCountsBySlot(requestsSnapshot);

            const storedSlots = (scheduleState.available_slots || []).map(parseStoredSlotValue);
            if (!storedSlots.length) return;

            let hasChanges = false;
            const nextStoredSlots = storedSlots.map(rawSlot => {
                const cleanId = normalizeSlotId(rawSlot);
                const isManualLock = rawSlot.includes('(/)');
                const isAutoLock = rawSlot.includes('(u)');
                if (isManualLock || isAutoLock) return rawSlot;
                if (!approvedSlots.has(cleanId)) return rawSlot;
                if ((approvedCounts[cleanId] || 0) < activeQuota) return rawSlot;
                hasChanges = true;
                return `${cleanId}(/)`;
            });

            if (!hasChanges) return;
            await db.ref(`schedules/${CURRENT_USER_KEY}/available_slots`).set(serializeAvailableSlots(nextStoredSlots));
        }

        function extractApplicantCodeFromQr(decodedText) {
            if (!decodedText) {
                return '';
            }

            const qrText = decodedText.trim();
            const normalizedText = qrText.toLowerCase();
            const shortLinkPrefix = 't.ly/';
            const fullLinkPrefix = 'https://t.ly/';
            const bareDomainPrefix = 'https://t.ly';

            if (normalizedText.startsWith(fullLinkPrefix)) {
                return qrText.slice(fullLinkPrefix.length).trim();
            }

            if (normalizedText.startsWith(shortLinkPrefix)) {
                return qrText.slice(shortLinkPrefix.length).trim();
            }

            if (normalizedText === bareDomainPrefix) {
                return '';
            }

            return qrText;
        }

        function normalizeApplicantCode(code) {
            if (!code) return '';
            return code.toString().trim().toLowerCase();
        }

        async function handleQrCodeDecoded(decodedText) {
            const applicantCode = extractApplicantCodeFromQr(decodedText);
            if (!applicantCode) {
                alert('Invalid QR code format.');
                return;
            }

            await closeQrScanner();

            let applicantName = '';
            try {
                const { data, error } = await supabaseClient
                    .from('Applicants')
                    .select('code, full_name')
                    .eq('code', applicantCode)
                    .limit(1);
                if (error) {
                    throw error;
                }

                const normalizedScannedCode = normalizeApplicantCode(applicantCode);
                const applicantRow = (data || []).find((row) => {
                    const candidateCodes = [
                        row.code,
                        row.Code,
                        row.applicant_code,
                        row.applicantCode,
                        row['Applicant code'],
                        row['Applicant Code']
                    ];
                    return candidateCodes.some((candidate) => normalizeApplicantCode(candidate) === normalizedScannedCode);
                });

                if (!applicantRow) {
                    alert('Applicant code not found.');
                    return;
                }
                applicantName = applicantRow.full_name || applicantRow.Name || applicantRow.name || applicantRow.applicant_name || '';
            } catch (error) {
                console.error('Failed to validate applicant code', error);
                alert('Unable to validate QR code right now.');
                return;
            }

            const normalizedApplicantName = (applicantName || '').trim().toLowerCase();
            const approvedEntry = Object.entries(allRequests).find(([, reqRaw]) => {
                const req = normalizeRequest(reqRaw);
                return req.resident === CURRENT_USER_NAME
                    && req.status === 'approved'
                    && (req.applicant || '').trim().toLowerCase() === normalizedApplicantName;
            });

            if (!approvedEntry) {
                alert("This applicant doesn't have an approved request.");
                return;
            }

            const [requestKey] = approvedEntry;
            await db.ref(`requests/${requestKey}`).update({
                status: 'completed',
                completed_at: Date.now()
            });
            alert('completed');
        }

        async function handleRescheduleAction(el) {
            if (!selectedSourceId) {
                if (el.querySelector('.initials-badge')) {
                    selectedSourceId = el.id;
                    el.classList.add('source-selected');
                    toast("👉 Pick destination slot");
                }
            } else {
                const targetId = el.id;
                const sourceClean = normalizeSlotId(selectedSourceId);
                const moveEntries = Object.entries(allRequests).filter(([, value]) => {
                    const req = normalizeRequest(value);
                    return req.resident === CURRENT_USER_NAME
                        && req.status === 'approved'
                        && req.slotIds.some(slotId => normalizeSlotId(slotId) === sourceClean);
                });

                if (moveEntries.length > 0) {
                    const updates = {};
                    const sourceSlotIds = new Set();
                    const scheduleState = (lastScheduleSnap && lastScheduleSnap.val()) || {};
                    const scheduleLocations = scheduleState.locations || {};
                    const scheduleNotes = scheduleState.slot_notes || {};
                    const sourceLocation = scheduleLocations[sourceClean] || '';
                    const sourceNote = scheduleNotes[sourceClean] || '';
                    for (const [key, value] of moveEntries) {
                        const req = normalizeRequest(value);
                        req.slotIds.forEach(slotId => sourceSlotIds.add(normalizeSlotId(slotId)));
                        const [day, timeKey] = targetId.split('-');
                        const newSlotIds = getConsecutiveSlotIds(day, timeKey, req.slotIds.length || 1);
                        if (!newSlotIds) {
                            toast("⚠️ Cannot reschedule to that slot range.");
                            return;
                        }
                        updates[`requests/${key}/slot_id`] = newSlotIds[0];
                        updates[`requests/${key}/slot_ids`] = newSlotIds;
                        updates[`requests/${key}/time_slot`] = newSlotIds[0];
                    }

                    // Always revert source slots to purple (available) state
                    const newSchedule = userSchedule.map(s => {
                        const clean = s.replace("(/)", "").replace("(u)", "").trim();
                        if (sourceSlotIds.has(clean)) {
                            // Revert source slot to plain available (no lock suffixes)
                            return clean;
                        }
                        return s;
                    });

                    // Update schedule to revert source slots
                    updates[`schedules/${CURRENT_USER_KEY}/available_slots`] = serializeAvailableSlots(newSchedule);
                    updates[`schedules/${CURRENT_USER_KEY}/locations/${targetId}`] = sourceLocation;
                    updates[`schedules/${CURRENT_USER_KEY}/slot_notes/${targetId}`] = sourceNote;
                    if (sourceClean !== targetId) {
                        updates[`schedules/${CURRENT_USER_KEY}/locations/${sourceClean}`] = null;
                        updates[`schedules/${CURRENT_USER_KEY}/slot_notes/${sourceClean}`] = null;
                    }

                    await db.ref().update(updates);
                    toggleRescheduleMode();
                    toast("✅ Rescheduled successfully!");
                }
            }
        }

        function getConsecutiveSlotIds(day, timeKey, count) {
            const index = TIME_SLOTS.findIndex(slot => slot.id === timeKey);
            if (index === -1) return null;
            const down = [];
            for (let i = 0; i < count; i++) {
                const idx = index + i;
                if (idx >= TIME_SLOTS.length) {
                    down.length = 0;
                    break;
                }
                down.push(`${day}-${TIME_SLOTS[idx].id}`);
            }
            if (down.length === count) return down;
            const up = [];
            for (let i = count - 1; i >= 0; i--) {
                const idx = index - i;
                if (idx < 0) {
                    up.length = 0;
                    break;
                }
                up.push(`${day}-${TIME_SLOTS[idx].id}`);
            }
            return up.length === count ? up : null;
        }

        async function parseCSVSchedule(file) {
            const text = await file.text();
            const lines = text.split(/\r?\n/).filter(line => line.trim());
            const busySlots = [];
            lines.forEach((line, index) => {
                const parts = parseCSVLine(line);
                if (parts.length < 3) {
                    return;
                }
                if (index === 0 && /day/i.test(parts[0])) {
                    return;
                }
                const day = normalizeDay(parts[0]);
                const { startMinutes, endMinutes } = correctTimeTyPos(parts[1], parts[2]);
                if (!day || Number.isNaN(startMinutes) || Number.isNaN(endMinutes)) {
                    return;
                }
                const slotsForRow = getSlotsForRange(day, startMinutes, endMinutes);
                slotsForRow.forEach(slotId => busySlots.push(slotId));
            });
            return Array.from(new Set(busySlots));
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i += 1) {
                const char = line[i];
                if (char === '"' && line[i + 1] === '"') {
                    current += '"';
                    i += 1;
                } else if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        function normalizeDay(dayValue) {
            if (!dayValue) return '';
            const trimmed = dayValue.trim().toLowerCase();
            const map = {
                // Full names
                'sunday': 'Sunday',
                'monday': 'Monday',
                'tuesday': 'Tuesday',
                'wednesday': 'Wednesday',
                'thursday': 'Thursday',
                'friday': 'Friday',
                'saturday': 'Saturday',
                // Three-letter abbreviations
                'sun': 'Sunday',
                'mon': 'Monday',
                'tue': 'Tuesday',
                'tues': 'Tuesday',
                'wed': 'Wednesday',
                'thu': 'Thursday',
                'thur': 'Thursday',
                'thurs': 'Thursday',
                'fri': 'Friday',
                'sat': 'Saturday',
                // Two-letter abbreviations
                'su': 'Sunday',
                'mo': 'Monday',
                'tu': 'Tuesday',
                'we': 'Wednesday',
                'th': 'Thursday',
                'fr': 'Friday',
                'sa': 'Saturday',
                // Single-letter abbreviations
                'm': 'Monday',
                't': 'Tuesday',
                'w': 'Wednesday',
                'f': 'Friday',
                's': 'Saturday'
            };

            // Direct match first
            if (map[trimmed]) return map[trimmed];

            // Try first 3 characters
            const short = trimmed.slice(0, 3);
            if (map[short]) return map[short];

            // Fallback to capitalized input
            return trimmed.charAt(0).toUpperCase() + trimmed.slice(1);
        }

        function parseTimeToMinutes(rawTime, isEndTime = false) {
            if (!rawTime) return NaN;
            const cleaned = rawTime.toString().trim().toUpperCase();
            const match = cleaned.match(/(\d{1,2})(?::(\d{2}))?\s*(AM|PM)?/);
            if (!match) return NaN;
            let hours = Number(match[1]);
            const minutes = Number(match[2] || '0');
            let meridiem = match[3];

            // Smart typo correction
            if (!meridiem) {
                // No AM/PM specified - infer based on hour
                if (hours >= 8 && hours <= 11) {
                    meridiem = 'AM'; // 8-11 are morning classes
                } else if (hours === 7) {
                    meridiem = isEndTime ? 'PM' : 'AM'; // 7 AM for start, 7 PM for end
                } else if (hours === 12 || (hours >= 1 && hours <= 6)) {
                    meridiem = 'PM'; // 12-6 are afternoon classes
                } else {
                    meridiem = 'AM'; // Default fallback
                }
            }

            if (meridiem === 'PM' && hours < 12) hours += 12;
            if (meridiem === 'AM' && hours === 12) hours = 0;
            return hours * 60 + minutes;
        }

        function correctTimeTyPos(startTimeRaw, endTimeRaw) {
            // Parse times with context awareness
            const startMinutes = parseTimeToMinutes(startTimeRaw, false);
            let endMinutes = parseTimeToMinutes(endTimeRaw, true);

            // If end time is before start time (PM to AM typo), fix it
            if (endMinutes < startMinutes) {
                // Extract hour from end time and force it to PM
                const cleaned = endTimeRaw.toString().trim().toUpperCase();
                const match = cleaned.match(/(\d{1,2})(?::(\d{2}))?/);
                if (match) {
                    let hours = Number(match[1]);
                    const minutes = Number(match[2] || '0');
                    // Force PM conversion
                    if (hours < 12) hours += 12;
                    endMinutes = hours * 60 + minutes;
                }
            }

            return { startMinutes, endMinutes };
        }

        function getSlotsForRange(day, startMinutes, endMinutes) {
            const slots = [];
            TIME_SLOTS.forEach(slot => {
                const slotStart = parseTimeToMinutes(slot.start);
                const slotEnd = parseTimeToMinutes(slot.end);
                if (slotStart >= startMinutes && slotEnd <= endMinutes) {
                    slots.push(normalizeSlotId(`${day}-${slot.id}`));
                }
            });
            return slots;
        }
        function normalizeRequest(req) {
            if (!req) return {};
            const slotId = req.slot_id || req.slotId || req.Slot_ID || req.SlotId;
            const slotIds = req.slot_ids || req.slotIds || req.Slot_IDs || req.SlotIds;
            const normalizedSlotIds = Array.isArray(slotIds) && slotIds.length ? slotIds : (slotId ? [slotId] : []);
            return {
                resident: req.resident || req.Resident || req.RESIDENT,
                status: req.status || req.Status || req.STATUS,
                applicant: req.applicant_name || req.applicant || req.Applicant || req.APPLICANT,
                applicantPic: req.applicant_pic || req.applicantPic || req.profile_pic || req.profilePic || req.photo_url || req.photoUrl || req.userPic || '',
                slotId,
                slotIds: normalizedSlotIds
            };
        }

        function toast(msg) {
            const el = document.getElementById('toast');
            el.innerText = msg;
            el.classList.add('show');
            setTimeout(() => {
                el.classList.remove('show');
            }, 3000);
        }

        function showLoading(isLoading) {
            const overlay = document.getElementById('loading-overlay');
            overlay.classList.toggle('show', isLoading);
        }

        // Initialize
        build();
        fetchLocations();
        checkMaintenanceSetting();
        toast("👁️ View Mode: Click slots for details. Enable Edit Mode to change availability.");

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                saveData();
            }
        });

        window.addEventListener('blur', () => {
            saveData();
        });

        // Listen for schedule changes
        db.ref(`schedules/${CURRENT_USER_KEY}`).on('value', (snap) => {
            lastScheduleSnap = snap;
            if (hasUnsavedChanges) return;
            render(snap);
        });

        // Listen for request changes
        db.ref('requests').on('value', async (snap) => {
            const nextRequests = snap.val() || {};
            const approvedSlots = getSlotsFromApprovalTransitions(allRequests, nextRequests);
            allRequests = nextRequests;
            try {
                await lockSlotsFromApprovalEvent(approvedSlots, nextRequests);
            } catch (error) {
                console.warn('Failed to lock slot from approval event', error);
            }
            if (hasUnsavedChanges) return;
            if (lastScheduleSnap) {
                render(lastScheduleSnap);
                return;
            }
            db.ref(`schedules/${CURRENT_USER_KEY}`).once('value').then(render);
        });

        fetchUserQuota()
            .catch((error) => {
                console.warn('Unexpected quota fetch error. Using default quota:', USER_QUOTA, error);
            })
            .finally(() => {
                isQuotaLoaded = true;
                db.ref(`schedules/${CURRENT_USER_KEY}`).once('value').then((snap) => {
                    if (!snap.exists() && lastScheduleSnap) {
                        render(lastScheduleSnap);
                        return;
                    }
                    render(snap);
                });
            });

    </script>
</body>
</html>
