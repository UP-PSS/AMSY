<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage | Resident Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #531C79;
            --bg: #F8FAFC;
            --border: #E2E8F0;
            --text-sub: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 40px 30px;
        }

        .welcome-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .welcome-title {
            font-size: clamp(32px, 6vw, 56px);
            font-weight: 900;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 10px;
            line-height: 1.1;
        }

        .welcome-subtitle {
            font-size: clamp(16px, 2vw, 20px);
            color: var(--text-sub);
            font-weight: 600;
            margin-bottom: 40px;
        }

        .panel-card {
            background: linear-gradient(145deg, #ffffff 0%, #f8f5ff 100%);
            border: 1px solid #e8dff4;
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 10px 26px -18px rgba(83, 28, 121, 0.6);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .panel-card::before {
            content: '';
            position: absolute;
            inset: -40% auto auto -20%;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(126, 58, 163, 0.16) 0%, rgba(126, 58, 163, 0) 72%);
            pointer-events: none;
        }

        .panel-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 32px -14px rgba(83, 28, 121, 0.28);
            border-color: var(--primary);
        }

        .panel-card > * {
            position: relative;
            z-index: 1;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            gap: 12px;
        }

        .panel-title-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-icon {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: grid;
            place-items: center;
            font-size: 16px;
            background: rgba(83, 28, 121, 0.11);
        }

        .panel-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0;
        }

        .panel-badge {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            border-radius: 999px;
            padding: 7px 12px;
            color: #5b3a78;
            background: #efe6fb;
        }

        .panel-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 24px;
        }

        .panel-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel-item {
            border: 1px solid #eadff5;
            border-radius: 16px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 18px -18px rgba(60, 16, 90, 0.8);
        }

        .panel-item h4 {
            font-size: 14px;
            font-weight: 800;
            margin-bottom: 8px;
            color: #0f172a;
        }

        .panel-item p {
            font-size: 13px;
            color: var(--text-sub);
            line-height: 1.5;
            word-break: break-word;
        }

        .notification-card {
            border-left: 4px solid #8a38c3;
        }

        .agenda-card {
            border-left: 4px solid #2563eb;
        }

        .agenda-date {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 999px;
            background: #eaf1ff;
            color: #2455bf;
            font-size: 12px;
            font-weight: 700;
            margin-top: 6px;
        }

        .loading-bar {
            height: 6px;
            width: 100%;
            border-radius: 999px;
            background: #ede9f3;
            overflow: hidden;
            margin-bottom: 14px;
        }

        .loading-bar::after {
            content: '';
            display: block;
            height: 100%;
            width: 45%;
            background: var(--primary);
            border-radius: 999px;
            animation: loading 1.1s infinite ease-in-out;
        }

        @keyframes loading {
            0% { transform: translateX(-120%); }
            100% { transform: translateX(260%); }
        }

        .user-info-section {
            background: linear-gradient(135deg, var(--primary) 0%, #7429a3 100%);
            color: white;
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 10px 25px rgba(83, 28, 121, 0.2);
        }

        .user-info-section h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .user-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .detail-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .detail-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 700;
        }

        @media (max-width: 900px) {
            body { padding: 30px 20px; }
            .panel-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 600px) {
            body { padding: 24px 16px; }
            .user-info-section { padding: 24px; }
            .panel-card { padding: 20px; }
            .welcome-title { font-size: clamp(28px, 8vw, 44px); }
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <h1 class="welcome-title" id="welcomeTitle">Welcome!</h1>
        <p class="welcome-subtitle" id="welcomeSubtitle">Resident Portal Dashboard</p>

        <div class="user-info-section" id="userInfoSection" style="display: none;">
            <h2>Your Profile</h2>
            <div class="user-details" id="userDetails"></div>
        </div>

        <div class="panel-grid">
            <div class="panel-card">
                <div class="panel-header">
                    <div class="panel-title-wrap">
                        <span class="panel-icon">🔔</span>
                        <div class="panel-title">Notification</div>
                    </div>
                    <span class="panel-badge">Latest</span>
                </div>
                <div id="notificationLoader" class="loading-bar"></div>
                <div id="notificationList" class="panel-list"></div>
            </div>

            <div class="panel-card">
                <div class="panel-header">
                    <div class="panel-title-wrap">
                        <span class="panel-icon">🗓️</span>
                        <div class="panel-title">Upcoming Agenda</div>
                    </div>
                    <span class="panel-badge">Next Events</span>
                </div>
                <div id="agendaLoader" class="loading-bar"></div>
                <div id="agendaList" class="panel-list"></div>
            </div>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient(
            'https://havsuikahafqciurmaeq.supabase.co',
            'sb_publishable_pNAu0cwHGyX2Pn_DlX71Og_-t1KZq6C'
        );

        // Load user data from localStorage/sessionStorage
        function loadUserData() {
            let userProfile = null;

            // Try sessionStorage first, then localStorage
            const sessionProfile = sessionStorage.getItem('userProfile');
            const localProfile = localStorage.getItem('userProfile');

            if (sessionProfile) {
                userProfile = JSON.parse(sessionProfile);
            } else if (localProfile) {
                userProfile = JSON.parse(localProfile);
            }

            if (userProfile) {
                const fullName = userProfile.userName || 'User';
                const email = userProfile.userEmail || localStorage.getItem('userEmail') || '';
                const category = userProfile.userClassification || '';
                const batch = userProfile['Batch'] || '';

                // Update welcome message
                document.getElementById('welcomeTitle').textContent = `Welcome, ${fullName}!`;

                // Display user info - replace email with category
                const userDetails = document.getElementById('userDetails');
                userDetails.innerHTML = `
                    <div class="detail-item">
                        <div class="detail-label">Full Name</div>
                        <div class="detail-value">${fullName}</div>
                    </div>
                    ${category ? `
                    <div class="detail-item">
                        <div class="detail-label">Classification</div>
                        <div class="detail-value">${category}</div>
                    </div>
                    ` : ''}
                    ${batch ? `
                    <div class="detail-item">
                        <div class="detail-label">Batch</div>
                        <div class="detail-value">${batch}</div>
                    </div>
                    ` : ''}
                `;

                document.getElementById('userInfoSection').style.display = 'block';
            }
        }

        async function loadAgenda() {
            const list = document.getElementById('agendaList');
            const loader = document.getElementById('agendaLoader');
            list.innerHTML = '';
            try {
                const { data, error } = await supabaseClient
                    .from('Agenda')
                    .select('agenda, start_date, end_date')
                    .order('start_date', { ascending: true })
                    .limit(3);
                if (error) throw error;
                if (!data || data.length === 0) {
                    list.innerHTML = '<div class="panel-item agenda-card"><p>No upcoming agenda.</p></div>';
                    return;
                }
                data.forEach(item => {
                    const start = item.start_date ? new Date(item.start_date) : null;
                    const end = item.end_date ? new Date(item.end_date) : null;
                    const sameDay = start && end && start.toDateString() === end.toDateString();
                    const dateText = start
                        ? `${start.toLocaleDateString('en-US', { month: 'long', day: 'numeric' })}${end && !sameDay ? ` - ${end.toLocaleDateString('en-US', { month: 'long', day: 'numeric' })}` : ''}`
                        : 'TBD';
                    list.insertAdjacentHTML('beforeend', `
                        <div class="panel-item agenda-card">
                            <h4>${item.agenda || 'Agenda Item'}</h4>
                            <span class="agenda-date">📅 ${dateText}</span>
                        </div>
                    `);
                });
            } catch (err) {
                list.innerHTML = '<div class="panel-item agenda-card"><p>Unable to load agenda.</p></div>';
            } finally {
                loader.style.display = 'none';
            }
        }

        async function loadNotifications() {
            const list = document.getElementById('notificationList');
            const loader = document.getElementById('notificationLoader');
            list.innerHTML = '';
            try {
                const { data, error } = await supabaseClient
                    .from('Notification')
                    .select('notifname, category, title, content')
                    .eq('category', 'Resident')
                    .order('notifname', { ascending: false })
                    .limit(5);

                if (error) throw error;
                if (!data || data.length === 0) {
                    list.innerHTML = '<div class="panel-item notification-card"><p>No notifications yet.</p></div>';
                    return;
                }
                data.forEach(item => {
                    list.insertAdjacentHTML('beforeend', `
                        <div class="panel-item notification-card">
                            <h4>${item.title || item.notifname || 'Notification'}</h4>
                            <p>${item.content || 'No details available.'}</p>
                        </div>
                    `);
                });
            } catch (err) {
                list.innerHTML = '<div class="panel-item notification-card"><p>Unable to load notifications.</p></div>';
            } finally {
                loader.style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadUserData();
            loadNotifications();
            loadAgenda();
        });
    </script>
</body>
</html>
