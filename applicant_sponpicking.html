<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Owl Sponsor App</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --purple: #6200ea; 
            --apple-green: #7cfc00;
            --deep-purple: #12002f;
            --soft-purple: #f3eaff;
        }

        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: linear-gradient(135deg, var(--purple) 0%, #310074 50%, var(--apple-green) 100%);
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden;
        }

        /* Mobile Container */
        .mobile-viewport {
            width: 100%; max-width: 430px; height: 100vh;
            background: white; position: relative;
            overflow-y: auto; display: flex; flex-direction: column;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6); scrollbar-width: none;
        }
        .mobile-viewport::-webkit-scrollbar { display: none; }

        /* Navigation Buttons */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 430px; display: flex; justify-content: center; gap: 35px; z-index: 100;
        }

        .icon-btn {
            width: 68px; height: 68px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 12px 30px rgba(0,0,0,0.3); cursor: pointer;
            transition: transform 0.2s ease;
        }
        .icon-btn:active { transform: scale(0.9); }
        .btn-x { color: #ff3b30; }
        .btn-owl { background: var(--purple); color: var(--apple-green); position: relative; }

        /* Like Heart Animation */
        .heart {
            position: absolute; bottom: 80px; color: var(--apple-green);
            font-size: 45px; opacity: 0; pointer-events: none;
            animation: flyUp 1s ease-out forwards;
        }
        @keyframes flyUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-200px) scale(1.5); opacity: 0; }
        }

        /* Profile Layout */
        .hero { position: relative; width: 100%; height: 100vh; flex-shrink: 0; background: #222; overflow: hidden; }
        .hero img { width: 100%; height: 100%; object-fit: cover; }
        
        .hero-overlay {
            position: absolute; bottom: 0; width: 100%; padding: 120px 25px 120px;
            background: linear-gradient(to top, rgba(18, 0, 47, 0.95) 15%, transparent 100%);
            color: white; box-sizing: border-box;
        }
        .hero-overlay h1 { margin: 0; font-size: 40px; font-weight: 900; letter-spacing: -1.5px; }
        .batch-badge { display: inline-block; margin-top: 10px; padding: 6px 14px; background: var(--apple-green); color: var(--deep-purple); border-radius: 8px; font-weight: 800; font-size: 13px; text-transform: uppercase; }

        .content { padding: 40px 25px 160px; background: white; }
        .section-label { color: var(--purple); font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; display: block; letter-spacing: 1.5px; }
        .bio-para { font-size: 18px; color: #333; line-height: 1.6; margin-bottom: 35px; }
        
        .pill-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 40px; }
        .pill { background: #f4ffeb; border: 2px solid var(--apple-green); padding: 10px 18px; border-radius: 50px; font-weight: 700; color: #2d5a00; font-size: 14px; }
        
        .prompt-card { background: var(--soft-purple); border-left: 6px solid var(--purple); padding: 22px; border-radius: 0 20px 20px 0; margin-bottom: 35px; }
        .prompt-q { font-size: 12px; color: var(--purple); font-weight: 700; margin-bottom: 6px; }
        .prompt-a { font-size: 19px; font-weight: 800; color: #1a1a1a; }

        .feed-img { 
            width: 100%; 
            border-radius: 20px; 
            margin: 10px 0 45px 0; 
            object-fit: cover; 
            min-height: 250px;
            max-height: 600px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            background: #f0f0f0;
        }
    </style>
</head>
<body>

    <div class="bottom-nav">
        <div class="icon-btn btn-x" onclick="handleDecline()">
            <span class="material-symbols-outlined">close</span>
        </div>
        <div class="icon-btn btn-owl" id="owlBtn" onclick="triggerLike()">
            <span class="material-symbols-outlined">owl</span>
        </div>
    </div>

    <div class="mobile-viewport" id="app-content">
        <div style="padding: 100px 30px; text-align: center; color: #666;">
            <p>Gathering Owl Sponsors...</p>
        </div>
    </div>

    <script>
        // Supabase Init
        const _URL = 'https://havsuikahafqciurmaeq.supabase.co';
        const _KEY = 'sb_publishable_pNAu0cwHGyX2Pn_DlX71Og_-t1KZq6C';
        const _owl = supabase.createClient(_URL, _KEY);
        const firebaseConfig = {
            apiKey: "AIzaSyCZ6z7ldY06D1bUofMEoVUAwMu90bqivuo",
            authDomain: "uppss-26c6f.firebaseapp.com",
            databaseURL: "https://uppss-26c6f-default-rtdb.firebaseio.com",
            projectId: "uppss-26c6f",
            storageBucket: "uppss-26c6f.firebasestorage.app",
            messagingSenderId: "734429390148",
            appId: "1:734429390148:web:97b7cad461e5505943a311"
        };
        firebase.initializeApp(firebaseConfig);
        const firebaseDb = firebase.database();
        let activeSponsor = null;

        /**
         * IMAGE ENGINE
         * Using the googleusercontent proxy which is the most stable for mobile/web browsers.
         */
        function fixDriveUrl(url) {
            if (!url || !url.includes('drive.google.com')) return url;
            let fileId = "";
            try {
                if (url.includes('/d/')) {
                    fileId = url.split('/d/')[1].split('/')[0];
                } else if (url.includes('id=')) {
                    fileId = url.split('id=')[1].split('&')[0];
                }
                return `https://lh3.googleusercontent.com/u/0/d/${fileId}=w1000-iv1`;
            } catch (e) {
                return url;
            }
        }

        async function loadNextSponsor() {
            const container = document.getElementById('app-content');
            container.scrollTop = 0;
            
            try {
                const { data, error } = await _owl.from('Sponsor').select('*');
                
                if (error) throw error;
                if (!data || data.length === 0) {
                    container.innerHTML = `<div style="padding:50px; text-align:center;">No sponsors found. Check your table name!</div>`;
                    return;
                }

                // Pick a random sponsor
                const randomSponsor = data[Math.floor(Math.random() * data.length)];
                activeSponsor = randomSponsor;
                renderProfile(randomSponsor);
            } catch (err) {
                container.innerHTML = `<div style="padding:50px; text-align:center; color:red;">${err.message}</div>`;
            }
        }

        function getApplicantEmail() {
            return sessionStorage.getItem('userEmail') || localStorage.getItem('userEmail') || 'unknown@applicant';
        }

        function saveSponsorDecision(status) {
            if (!activeSponsor) return;
            const applicantEmail = getApplicantEmail();
            const sponsorName = activeSponsor.sponsor_name || 'Anonymous';
            const sponsorDetail = activeSponsor.about_me || 'No details provided';
            const timeline = new Date().toISOString();

            firebaseDb.ref('sponsor_picking').push({
                applicant_email: applicantEmail,
                sponsor_name: sponsorName,
                sponsor_detail: sponsorDetail,
                decision: status,
                timeline,
                detail: `${applicantEmail} | ${sponsorName} | ${sponsorDetail} | ${status} | ${timeline}`
            });
        }

        function handleDecline() {
            saveSponsorDecision('declined');
            loadNextSponsor();
        }

        function renderProfile(s) {
            const app = document.getElementById('app-content');
            
            // Fix Drive Links
            const img1 = fixDriveUrl(s.picture1);
            const img2 = s.picture2 ? fixDriveUrl(s.picture2) : null;
            const img3 = s.picture3 ? fixDriveUrl(s.picture3) : null;

            // Interests
            const interestsHtml = s.interests ? s.interests.split(',').map(i => `<div class="pill">${i.trim()}</div>`).join('') : '';

            // Prompts
            const promptArray = [s.prompt1, s.prompt2, s.prompt3].filter(p => p && p.includes('|'));

            app.innerHTML = `
                <div class="hero">
                    <img src="${img1}" onerror="this.src='https://dummyimage.com/600x1200/cccccc/ffffff.png&text=Check+Drive+Permissions'" alt="Profile">
                    <div class="hero-overlay">
                        <h1>${s.sponsor_name || 'Anonymous'}, ${s.age || '??'}</h1>
                        <div class="batch-badge">Batch ${s.batch || '2026'}</div>
                    </div>
                </div>

                <div class="content">
                    <span class="section-label">About Me</span>
                    <p class="bio-para">${s.about_me || "Supporting the Owl community with pride!"}</p>

                    <span class="section-label">My Interests</span>
                    <div class="pill-container">${interestsHtml || 'No interests specified'}</div>

                    ${img2 ? `<img src="${img2}" class="feed-img" onerror="this.style.display='none'">` : ''}

                    <span class="section-label">Quick Prompts</span>
                    ${promptArray.map(p => {
                        const parts = p.split('|');
                        return `<div class="prompt-card">
                                    <div class="prompt-q">${parts[0].trim()}</div>
                                    <div class="prompt-a">${parts[1].trim()}</div>
                                </div>`;
                    }).join('')}

                    ${img3 ? `<img src="${img3}" class="feed-img" onerror="this.style.display='none'">` : ''}
                </div>
            `;
        }

        function triggerLike() {
            const heart = document.createElement('span');
            heart.className = 'material-symbols-outlined heart';
            heart.innerText = 'favorite';
            document.getElementById('owlBtn').appendChild(heart);
            saveSponsorDecision('approved');
            loadNextSponsor();
            setTimeout(() => heart.remove(), 1000);
        }

        // Init
        loadNextSponsor();
    </script>
</body>
</html>
