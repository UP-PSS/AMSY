<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>spOWLsor App</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="preconnect" href="https://i.ibb.co" crossorigin>
    <link rel="dns-prefetch" href="https://i.ibb.co">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --purple: #6200ea; 
            --apple-green: #7cfc00;
            --deep-purple: #12002f;
            --soft-purple: #f3eaff;
        }
        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        .mobile-viewport {
            width: 100%; max-width: 430px; height: 100vh;
            background: white; position: relative;
            overflow-y: auto; display: flex; flex-direction: column;
            box-shadow: 0 40px 100px rgba(0,0,0,0.15); scrollbar-width: none;
        }
        .mobile-viewport::-webkit-scrollbar { display: none; }
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 430px; display: flex; justify-content: center; gap: 35px; z-index: 100;
        }
        .icon-btn {
            width: 68px; height: 68px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 12px 30px rgba(0,0,0,0.3); cursor: pointer;
            transition: transform 0.2s ease;
        }
        .icon-btn:hover { transform: translateY(-2px) scale(1.02); }
        .icon-btn:active { transform: scale(0.9); }
        .btn-x { color: #ff3b30; }
        .btn-owl {
            background: var(--purple); color: var(--apple-green); position: relative;
            animation: owlPulse 1.8s ease-in-out infinite;
        }
        @keyframes owlPulse {
            0%, 100% { box-shadow: 0 12px 30px rgba(0,0,0,0.3); }
            50% { box-shadow: 0 14px 35px rgba(124,252,0,0.35); }
        }
        .heart {
            position: absolute; bottom: 80px; color: var(--apple-green);
            font-size: 45px; opacity: 0; pointer-events: none;
            animation: flyUp 1s ease-out forwards;
        }
        @keyframes flyUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-200px) scale(1.5); opacity: 0; }
        }
        .hero {
            position: relative; width: 100%; height: 100vh; flex-shrink: 0;
            background: #222; overflow: hidden; animation: cardEnter 420ms ease both;
        }
        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(24px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes cardExitLeft {
            to { opacity: 0; transform: translateX(-120px) rotate(-8deg) scale(0.92); }
        }
        @keyframes cardExitRight {
            to { opacity: 0; transform: translateX(120px) rotate(8deg) scale(0.92); }
        }
        .hero.swipe-left, .content.swipe-left { animation: cardExitLeft 260ms ease forwards; }
        .hero.swipe-right, .content.swipe-right { animation: cardExitRight 260ms ease forwards; }
        .hero img { width: 100%; height: 100%; object-fit: cover; }
        .image-shell { position: relative; width: 100%; background: #ececf1; overflow: hidden; }
        .image-shell img { display: block; width: 100%; height: 100%; object-fit: cover; }
        .image-shell.loading img { opacity: 0; }
        .img-loader { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.65); }
        .image-shell:not(.loading) .img-loader { display: none; }
        .img-loader::after { content: ''; width: 34px; height: 34px; border-radius: 50%; border: 3px solid rgba(98,0,234,0.2); border-top-color: var(--purple); animation: spin 0.85s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hero-overlay {
            position: absolute; bottom: 0; width: 100%; padding: 120px 25px 120px;
            background: linear-gradient(to top, rgba(18,0,47,0.95) 15%, transparent 100%);
            color: white; box-sizing: border-box;
        }
        .hero-overlay h1 { margin: 0; font-size: 40px; font-weight: 900; letter-spacing: -1.5px; }
        .batch-badge { display: inline-block; margin-top: 10px; padding: 6px 14px; background: var(--apple-green); color: var(--deep-purple); border-radius: 8px; font-weight: 800; font-size: 13px; text-transform: uppercase; }
        .content {
            padding: 40px 25px 160px; background: white;
            animation: contentRise 520ms ease 80ms both;
        }
        @keyframes contentRise {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .section-label { color: var(--purple); font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; display: block; letter-spacing: 1.5px; }
        .bio-para { font-size: 18px; color: #333; line-height: 1.6; margin-bottom: 35px; }
        .pill-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 40px; }
        .pill { background: #f4ffeb; border: 2px solid var(--apple-green); padding: 10px 18px; border-radius: 50px; font-weight: 700; color: #2d5a00; font-size: 14px; }
        .prompt-card { background: var(--soft-purple); border-left: 6px solid var(--purple); padding: 22px; border-radius: 0 20px 20px 0; margin-bottom: 35px; }
        .prompt-q { font-size: 12px; color: var(--purple); font-weight: 700; margin-bottom: 6px; }
        .prompt-a { font-size: 19px; font-weight: 800; color: #1a1a1a; }
        .feed-img {
            width: 100%; border-radius: 20px; margin: 10px 0 45px 0;
            object-fit: cover; min-height: 250px; max-height: 600px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: #f0f0f0;
        }
        .empty-state {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; padding: 40px; text-align: center;
        }
        .empty-state .owl-icon { font-size: 80px; color: var(--purple); margin-bottom: 20px; }
        .empty-state h2 { font-size: 26px; font-weight: 900; color: var(--deep-purple); margin: 0 0 12px; }
        .empty-state p { font-size: 16px; color: #666; line-height: 1.6; }
        .loading-state {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; color: #666; font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="bottom-nav" id="bottom-nav" style="display:none;">
        <div class="icon-btn btn-x" onclick="handleDecline()">
            <span class="material-symbols-outlined">close</span>
        </div>
        <div class="icon-btn btn-owl" id="owlBtn" onclick="triggerLike()">
            <span class="material-symbols-outlined">owl</span>
        </div>
    </div>

    <div class="mobile-viewport" id="app-content">
        <div class="loading-state">Gathering spOWLsors...</div>
    </div>

    <script>
        // ── Supabase ───────────────────────────────────────────────────
        const _URL = 'https://havsuikahafqciurmaeq.supabase.co';
        const _KEY = 'sb_publishable_pNAu0cwHGyX2Pn_DlX71Og_-t1KZq6C';
        const _owl = supabase.createClient(_URL, _KEY);

        // ── Firebase ───────────────────────────────────────────────────
        firebase.initializeApp({
            apiKey: "AIzaSyCZ6z7ldY06D1bUofMEoVUAwMu90bqivuo",
            authDomain: "uppss-26c6f.firebaseapp.com",
            databaseURL: "https://uppss-26c6f-default-rtdb.firebaseio.com",
            projectId: "uppss-26c6f",
            storageBucket: "uppss-26c6f.firebasestorage.app",
            messagingSenderId: "734429390148",
            appId: "1:734429390148:web:97b7cad461e5505943a311"
        });
        const db = firebase.database();

        // ── State ──────────────────────────────────────────────────────
        let queue  = [];   // shuffled undecided spOWLsors
        let active = null; // currently shown spOWLsor
        let isAnimating = false;

        // ── Helpers ────────────────────────────────────────────────────

        /** Make a string safe as a Firebase key  (no . # $ [ ] /) */
        function fbKey(str) {
            return (str || '').replace(/[.#$[\]/]/g, '_');
        }

        function getEmail() {
            return sessionStorage.getItem('userEmail')
                || localStorage.getItem('userEmail')
                || 'unknown@applicant';
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function fixDriveUrl(url) {
            if (!url || !url.includes('drive.google.com')) return url;
            try {
                let id = url.includes('/d/')
                    ? url.split('/d/')[1].split('/')[0]
                    : url.split('id=')[1].split('&')[0];
                return 'https://lh3.googleusercontent.com/u/0/d/' + id + '=w1000-iv1';
            } catch (e) { return url; }
        }

        // ── Firebase write ─────────────────────────────────────────────
        // sponsor_picking / {safeEmail} / sponsor / {safeSponsorName}
        // value → "{decision} | {unixMs}"   e.g. "approved | 1772128243334"
        function saveDecision(status) {
            if (!active) return;
            const path = 'sponsor_picking/'
                + fbKey(getEmail()) + '/sponsor/'
                + fbKey(active.sponsor_name || 'Anonymous');
            db.ref(path).set(status + ' | ' + Date.now());
        }

        // ── Boot ───────────────────────────────────────────────────────
        async function init() {
            try {
                // 1. Pull all spOWLsors from Supabase
                const { data, error } = await _owl.from('Sponsor').select('*');
                if (error) throw error;
                if (!data || !data.length) { showEmpty('No spOWLsors found.', 'The spOWLsor pool is empty right now.'); return; }

                // 2. Pull decisions already made by this applicant
                const snap    = await db.ref('sponsor_picking/' + fbKey(getEmail()) + '/sponsor').once('value');
                const decided = snap.val() || {};

                // 3. Filter out already-decided spOWLsors
                const undecided = data.filter(s => !decided.hasOwnProperty(fbKey(s.sponsor_name || 'Anonymous')));

                if (!undecided.length) {
                    showEmpty('No more available spOWLsors.', "You've reviewed every spOWLsor in the pool. Check back later!");
                    return;
                }

                // 4. Shuffle for randomized order, then show first
                queue = shuffle(undecided);
                next();

            } catch (err) {
                document.getElementById('app-content').innerHTML =
                    '<div style="padding:50px;text-align:center;color:red;"><strong>Error:</strong><br>' + err.message + '</div>';
            }
        }

        // ── Navigation ─────────────────────────────────────────────────

        function next() {
            document.getElementById('app-content').scrollTop = 0;
            if (!queue.length) {
                showEmpty('No more available spOWLsors.', "You've reviewed every spOWLsor in the pool. Check back later!");
                document.getElementById('bottom-nav').style.display = 'none';
                return;
            }
            active = queue.shift();
            render(active);
            document.getElementById('bottom-nav').style.display = 'flex';
        }

        function handleDecline() {
            animateDecision('left', 'declined');
        }

        function animateDecision(direction, status) {
            if (isAnimating) return;
            isAnimating = true;

            const hero = document.querySelector('.hero');
            const content = document.querySelector('.content');
            if (!hero || !content) {
                saveDecision(status);
                next();
                isAnimating = false;
                return;
            }

            const cls = direction === 'right' ? 'swipe-right' : 'swipe-left';
            hero.classList.add(cls);
            content.classList.add(cls);

            setTimeout(() => {
                saveDecision(status);
                next();
                isAnimating = false;
            }, 260);
        }

        function triggerLike() {
            const heart = document.createElement('span');
            heart.className = 'material-symbols-outlined heart';
            heart.innerText = 'favorite';
            document.getElementById('owlBtn').appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
            animateDecision('right', 'approved');
        }

        // ── Render ─────────────────────────────────────────────────────

        function buildImageShell(src, className, fallbackUrl, loadingAttr, fetchPriority) {
            const safeSrc = src || '';
            const safeFallback = fallbackUrl || '';
            return '<div class="image-shell loading ' + className + '">' +
                '<img src="' + safeSrc + '" alt="" loading="' + loadingAttr + '" decoding="async" fetchpriority="' + fetchPriority + '" data-fallback="' + safeFallback + '">' +
                '<div class="img-loader" aria-hidden="true"></div>' +
            '</div>';
        }

        function initializeImageLoading() {
            document.querySelectorAll('.image-shell img').forEach((img) => {
                const shell = img.closest('.image-shell');
                const settle = () => shell && shell.classList.remove('loading');

                if (img.complete && img.naturalWidth > 0) {
                    settle();
                    return;
                }

                img.addEventListener('load', settle, { once: true });
                img.addEventListener('error', () => {
                    const fallback = img.dataset.fallback || '';
                    if (fallback && img.src !== fallback) {
                        img.src = fallback;
                        return;
                    }
                    if (shell) {
                        if (shell.classList.contains('feed-img')) {
                            shell.style.display = 'none';
                        }
                        shell.classList.remove('loading');
                    }
                }, { once: true });
            });
        }

        function render(s) {
            const app = document.getElementById('app-content');

            const i1 = fixDriveUrl(s.picture1);
            const i2 = s.picture2 ? fixDriveUrl(s.picture2) : null;
            const i3 = s.picture3 ? fixDriveUrl(s.picture3) : null;

            const pills = s.interests
                ? s.interests.split(',').map(x => '<div class="pill">' + x.trim() + '</div>').join('')
                : '';

            const prompts = [s.prompt1, s.prompt2, s.prompt3]
                .filter(p => p && p.includes('|'))
                .map(p => {
                    const [q, a] = p.split('|');
                    return '<div class="prompt-card"><div class="prompt-q">' + q.trim() + '</div><div class="prompt-a">' + (a||'').trim() + '</div></div>';
                }).join('');

            app.innerHTML =
                '<div class="hero">' +
                    buildImageShell(i1, 'hero-media', 'https://dummyimage.com/600x1200/ccc/fff&text=No+Image', 'eager', 'high') +
                    '<div class="hero-overlay">' +
                        '<h1>' + (s.sponsor_name||'Anonymous') + ', ' + (s.age||'??') + '</h1>' +
                        '<div class="batch-badge">Batch ' + (s.batch||'2026') + '</div>' +
                    '</div>' +
                '</div>' +
                '<div class="content">' +
                    '<span class="section-label">About Me</span>' +
                    '<p class="bio-para">' + (s.about_me||'Supporting the Owl community with pride!') + '</p>' +
                    (pills ? '<span class="section-label">My Interests</span><div class="pill-container">' + pills + '</div>' : '') +
                    (i2 ? buildImageShell(i2, 'feed-img', '', 'lazy', 'low') : '') +
                    (prompts ? '<span class="section-label">Quick Prompts</span>' + prompts : '') +
                    (i3 ? buildImageShell(i3, 'feed-img', '', 'lazy', 'low') : '') +
                '</div>';

            initializeImageLoading();
        }

        function showEmpty(title, msg) {
            document.getElementById('bottom-nav').style.display = 'none';
            document.getElementById('app-content').innerHTML =
                '<div class="empty-state">' +
                    '<span class="material-symbols-outlined owl-icon">owl</span>' +
                    '<h2>' + title + '</h2><p>' + msg + '</p>' +
                '</div>';
        }

        init();
    </script>
</body>
</html>
