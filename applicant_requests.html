<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applicant Requests | UPLB AMIS</title>
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #531C79; --border: #E2E8F0; --text: #1E293B; --free-bg: #F3E5F5;
            --pending: #94A3B8; --approved: #531C79; --declined: #AD1457; --completed: #2FB344;
        }
        body { font-family: Inter, sans-serif; margin: 0; background: #F8FAFC; color: var(--text); padding: 14px; }
        .page-title { color: var(--primary); font-size: clamp(30px, 6vw, 42px); font-weight: 900; text-align: center; letter-spacing: -2px; margin: 6px 0 18px; text-transform: uppercase; }
        .top-row { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap: wrap; max-width:1200px; margin:0 auto 10px; }
        .status-filters { display:flex; gap:8px; flex-wrap:wrap; }
        .filter-btn { border:1px solid var(--border); background:#fff; color:#475569; padding:8px 12px; border-radius:999px; font-size:12px; font-weight:800; cursor:pointer; }
        .filter-btn.active { background: var(--primary); color:#fff; border-color:var(--primary); }
        .summary-counters { display:flex; gap:8px; margin-left:auto; }
        .counter-pill { border:1px solid #D6DCE5; border-radius:12px; padding:8px 12px; font-size:13px; font-weight:700; white-space:nowrap; background:#fff; }
        .counter-pill-quota { background: #F1E8FA; color: #531C79; border-color: #D8C2EA; }
        .counter-pill-requests { background: #FDEAF2; color: #9D174D; border-color: #F4BDD5; }

        .table-container { max-width:1200px; margin:0 auto; overflow:auto; background:#fff; border:1px solid var(--border); border-radius:16px; position:relative; }
        #grid-loader { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,.75); z-index:2; }
        #grid-loader .spinner { width:30px; height:30px; border:4px solid #E2E8F0; border-top-color:var(--primary); border-radius:999px; animation:spin .9s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg);} }
        table { width:100%; min-width:850px; border-collapse:separate; border-spacing:3px; table-layout:fixed; }
        thead th { position:sticky; top:0; background:#fff; padding:8px 0; font-size:12px; font-weight:900; color:var(--primary); }
        .time-col { width:86px; text-align:center; font-size:10px; font-weight:800; color:#64748B; }
        .slot { position:relative; min-height:66px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:.05em; }
        .slot.available { background: var(--free-bg); color: #7c3a9d; }
        .slot.status-pending { background: var(--pending); color:#fff; }
        .slot.status-approved { background: var(--approved); color:#fff; cursor:pointer; }
        .slot.status-completed { background: var(--completed); color:#fff; }
        .slot.status-declined { background: var(--declined); color:#fff; }
        .slot.unavailable { background: transparent; border:1px solid #F1F5F9; color:transparent; }
        .slot-counter { position:absolute; top:4px; right:4px; min-width:16px; height:16px; border-radius:999px; font-size:10px; font-weight:900; background:#fff; color:var(--primary); border:1px solid #D8B4FE; display:flex; align-items:center; justify-content:center; }

        .request-list-wrap { max-width:1200px; margin:16px auto 0; }
        .section-label { font-size:10px; font-weight:900; color:var(--primary); opacity:.6; margin-bottom:8px; text-transform:uppercase; letter-spacing:.2em; }
        #request-list { display:grid; gap:10px; }
        .request-card { background:#fff; border:1px solid var(--border); border-radius:14px; padding:12px; }
        .request-card .row { display:flex; justify-content:space-between; gap:10px; align-items:center; }
        .status-chip { font-size:10px; font-weight:900; padding:4px 8px; border-radius:999px; text-transform:uppercase; }

        #detailsOverlay, .maintenance-overlay { position:fixed; inset:0; background:rgba(15,23,42,.65); display:none; align-items:center; justify-content:center; z-index:1000; }
        #detailsModal, .maintenance-card { background:#fff; border-radius:16px; padding:20px; width:min(460px,92%); }
        .maintenance-card { text-align:center; }
        .meta { font-size:13px; color:#334155; margin:6px 0; }
        .meta strong { color:#0f172a; }
        @media (max-width: 768px) { .summary-counters { width:100%; justify-content:flex-end; } .slot{min-height:52px;font-size:0;} }
    </style>
</head>
<body>
    <div class="maintenance-overlay" id="maintenanceOverlay"><div class="maintenance-card"><h2>Website Under Maintenance</h2><p>The portal is currently under maintenance. Please check back later.</p></div></div>
    <h1 class="page-title">Requests</h1>

    <div class="top-row">
        <div class="status-filters" id="statusFilters">
            <button class="filter-btn active" data-status="all">All</button>
            <button class="filter-btn" data-status="pending">Pending</button>
            <button class="filter-btn" data-status="approved">Approved</button>
            <button class="filter-btn" data-status="completed">Completed</button>
        </div>
        <div class="summary-counters">
            <span class="counter-pill counter-pill-requests" id="requestsSentCounter">Requests Sent: —</span>
            <span class="counter-pill counter-pill-quota" id="quotaCounter">Quota Left: —</span>
        </div>
    </div>

    <div class="table-container">
        <div id="grid-loader"><div class="spinner"></div></div>
        <table>
            <thead><tr><th>TIME SLOT</th><th>SUN</th><th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th><th>SAT</th></tr></thead>
            <tbody id="grid-body"></tbody>
        </table>
    </div>

    <div class="request-list-wrap">
        <div class="section-label">My Requests</div>
        <div id="request-list"></div>
    </div>

    <div id="detailsOverlay" onclick="closeDetails()"><div id="detailsModal" onclick="event.stopPropagation()"><h3 style="margin-top:0;color:#531C79">Approved Appointment Details</h3><div id="detailsContent"></div><div style="text-align:right;margin-top:12px;"><button onclick="closeDetails()" style="border:none;background:#531C79;color:#fff;padding:8px 12px;border-radius:8px;font-weight:700;">Close</button></div></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = { apiKey:"AIzaSyCZ6z7ldY06D1bUofMEoVUAwMu90bqivuo", authDomain:"uppss-26c6f.firebaseapp.com", projectId:"uppss-26c6f", storageBucket:"uppss-26c6f.firebasestorage.app", messagingSenderId:"734429390148", appId:"1:734429390148:web:97b7cad461e5505943a311" };
const app = initializeApp(firebaseConfig); const db = getDatabase(app);
const supabaseClient = supabase.createClient('https://havsuikahafqciurmaeq.supabase.co','sb_publishable_pNAu0cwHGyX2Pn_DlX71Og_-t1KZq6C');
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const TIME_SLOTS=[{s:'7:00 AM',e:'7:30 AM'},{s:'7:30 AM',e:'8:00 AM'},{s:'8:00 AM',e:'8:30 AM'},{s:'8:30 AM',e:'9:00 AM'},{s:'9:00 AM',e:'9:30 AM'},{s:'9:30 AM',e:'10:00 AM'},{s:'10:00 AM',e:'10:30 AM'},{s:'10:30 AM',e:'11:00 AM'},{s:'11:00 AM',e:'11:30 AM'},{s:'11:30 AM',e:'12:00 PM'},{s:'12:00 PM',e:'12:30 PM'},{s:'12:30 PM',e:'1:00 PM'},{s:'1:00 PM',e:'1:30 PM'},{s:'1:30 PM',e:'2:00 PM'},{s:'2:00 PM',e:'2:30 PM'},{s:'2:30 PM',e:'3:00 PM'},{s:'3:00 PM',e:'3:30 PM'},{s:'3:30 PM',e:'4:00 PM'},{s:'4:00 PM',e:'4:30 PM'},{s:'4:30 PM',e:'5:00 PM'},{s:'5:00 PM',e:'5:30 PM'},{s:'5:30 PM',e:'6:00 PM'},{s:'6:00 PM',e:'6:30 PM'},{s:'6:30 PM',e:'7:00 PM'},{s:'7:00 PM',e:'7:30 PM'},{s:'7:30 PM',e:'8:00 PM'}];
const MAINTENANCE_ADMIN_EMAILS=['avpaner@up.edu.ph','pnrjr.abl@gmail.com'];

let allRequests={}; let selectedStatus='all'; let applicantQuota=3;
const applicantName=getApplicantName();
let scheduleWindow={opendate:null, closedate:null};
let hasAttemptedClosedateMerge=false;
const residentEmailByName=new Map();
const applicantEmailByName=new Map();

function getApplicantName(){ const raw=sessionStorage.getItem('userProfile')||localStorage.getItem('userProfile'); if(!raw)return 'Unknown Applicant'; try{const p=JSON.parse(raw); return p.userName||p.full_name||'Unknown Applicant';}catch{return 'Unknown Applicant';}}
function getApplicantClassification(){ const raw=sessionStorage.getItem('userProfile')||localStorage.getItem('userProfile'); if(!raw)return ''; try{const p=JSON.parse(raw); return p.userClassification||p.classification||'';}catch{return '';} }
function normalizeSettingTitle(v){return (v||'').toString().trim().toLowerCase();}
function isMaintenanceAdmin(email){ return email && MAINTENANCE_ADMIN_EMAILS.includes(email.toLowerCase()); }
async function checkMaintenanceSetting(){ try{ const {data,error}=await supabaseClient.from('Setting').select('Settingtitle, Number'); if(error||!data)return; const st=data.find(r=>normalizeSettingTitle(r['Setting title']||r['Settingtitle'])==='maintenance'); const enabled=st&&Number(st['Number'])===1; const email=sessionStorage.getItem('userEmail')||localStorage.getItem('userEmail')||''; document.getElementById('maintenanceOverlay').style.display=(enabled && !isMaintenanceAdmin(email))?'flex':'none'; }catch(e){ console.warn(e);} }

function getSlotParts(slotId){ if(!slotId||typeof slotId!=='string')return null; const [day,time]=slotId.split('-'); if(!day||!time) return null; const match=time.match(/(\d{1,2})(\d{2})(AM|PM)/i); if(!match)return null; return {day:day.trim(), compact: `${match[1]}:${match[2]} ${match[3].toUpperCase()}`}; }
function formatSlotRange(slotIds){ if(!slotIds?.length) return 'N/A'; return slotIds.join(' | '); }
function parseScheduleDate(raw){
    if(!raw || typeof raw!=='string') return null;
    const normalized=raw.replace(/\s+/g,' ').trim();
    const parts=normalized.match(/^([A-Za-z]+\s+\d{1,2},\s*\d{4})\s*-\s*(\d{1,2}:\d{2}\s*[AP]M)$/i);
    if(!parts) return null;
    const parsed=new Date(`${parts[1]} ${parts[2].toUpperCase()}`);
    return Number.isNaN(parsed.getTime())?null:parsed;
}
function normalizeEmail(value){ return (value||'').toString().trim().toLowerCase(); }
function mapProfilesByName(rows,mapRef){
    (rows||[]).forEach((row)=>{
        const name=(row?.full_name || row?.name || row?.Name || '').toString().trim();
        const email=normalizeEmail(row?.email || row?.Email || row?.mail || row?.Mail);
        if(name && email && !mapRef.has(name)) mapRef.set(name,email);
    });
}
async function hydrateEmailLookups(){
    if(residentEmailByName.size && applicantEmailByName.size) return;
    const [residentsResp, applicantsResp]=await Promise.all([
        supabaseClient.from('Residents').select('full_name,email'),
        supabaseClient.from('Applicants').select('full_name,email')
    ]);
    if(!residentsResp.error) mapProfilesByName(residentsResp.data,residentEmailByName);
    if(!applicantsResp.error) mapProfilesByName(applicantsResp.data,applicantEmailByName);
}
function getResidentEmail(request){
    const direct=normalizeEmail(request?.resident_mail || request?.resident_email || request?.residentEmail || request?.residentMail);
    if(direct) return direct;
    const residentName=(request?.resident||'').toString().trim();
    return normalizeEmail(residentEmailByName.get(residentName));
}
function getApplicantEmail(request){
    const direct=normalizeEmail(request?.applicants_mail || request?.applicant_mail || request?.applicant_email || request?.applicantEmail || request?.email);
    if(direct) return direct;
    const applicantName=(request?.applicant_name || request?.applicant || '').toString().trim();
    return normalizeEmail(applicantEmailByName.get(applicantName));
}
function stableRequestId(seed){
    const base=`${seed || ''}`;
    let hash=0;
    for(let i=0;i<base.length;i+=1){ hash=((hash<<5)-hash)+base.charCodeAt(i); hash|=0; }
    const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let n=Math.abs(hash);
    let code='';
    while(code.length<10){ code+=chars[n%chars.length]; n=Math.floor(n/chars.length)||Math.abs((n*1103515245+12345)&0x7fffffff); }
    return `UP_PSS-AMSY-${code.slice(0,10)}`;
}
function parseSlotId(slotId){
    if(!slotId || typeof slotId!=='string') return null;
    const [rawDay, ...timeParts]=slotId.split('-');
    if(!rawDay || !timeParts.length) return null;
    const day=rawDay.trim().toUpperCase();
    const time=timeParts.join('-').trim().toUpperCase();
    const weekday=['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'].indexOf(day);
    if(weekday<0) return null;
    const mt=time.match(/^(\d{1,2}):(\d{2})\s*([AP]M)$/i);
    if(!mt) return null;
    let hour=Number(mt[1]);
    const minute=Number(mt[2]);
    const mer=mt[3].toUpperCase();
    if(mer==='PM' && hour!==12) hour+=12;
    if(mer==='AM' && hour===12) hour=0;
    return { day, weekday, timeLabel:`${mt[1]}:${mt[2]} ${mer}`, hour, minute };
}
function getUpcomingWeekdayDate(baseDate,targetWeekday){
    const next=new Date(baseDate);
    next.setHours(0,0,0,0);
    const daysAhead=(targetWeekday-next.getDay()+7)%7;
    next.setDate(next.getDate()+daysAhead);
    return next;
}
function formatDateTimeForRequest(slotId,closedate){
    const slot=parseSlotId(slotId);
    if(!slot || !closedate) return slotId || '';
    const eventDate=getUpcomingWeekdayDate(closedate,slot.weekday);
    eventDate.setHours(slot.hour,slot.minute,0,0);
    const dateText=eventDate.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    return `${dateText} - ${slot.timeLabel}`;
}
async function mergeRequestsToSupabaseIfClosed(){
    if(hasAttemptedClosedateMerge || !scheduleWindow.closedate || Object.keys(allRequests).length===0) return;
    const now=new Date();
    if(now<scheduleWindow.closedate) return;
    hasAttemptedClosedateMerge=true;
    await hydrateEmailLookups();
    const grouped={};
    Object.values(allRequests).forEach((req={})=>{
        const status=(req.status||'').toString().toLowerCase();
        if(['declined','cancelled'].includes(status)) return;
        const slots=Array.isArray(req.slot_ids)&&req.slot_ids.length?req.slot_ids:(req.slot_id?[req.slot_id]:[]);
        const residentMail=getResidentEmail(req);
        if(!residentMail || !slots.length) return;
        slots.forEach((slotId)=>{
            const key=`${residentMail}__${slotId}`;
            if(!grouped[key]) grouped[key]={ residentMail, slotId, applicantSet:new Set(), residentNote:req.resident_note||req.note||'', location:req.location||'' };
            const applicantMail=getApplicantEmail(req);
            if(applicantMail) grouped[key].applicantSet.add(applicantMail);
            if(!grouped[key].residentNote && (req.resident_note||req.note)) grouped[key].residentNote=req.resident_note||req.note;
            if(!grouped[key].location && req.location) grouped[key].location=req.location;
        });
    });
    const closedIso=scheduleWindow.closedate.toISOString();
    const payload=Object.values(grouped).map((entry)=>({
        request_id:stableRequestId(`${entry.residentMail}|${entry.slotId}|${closedIso}`),
        resident_mail:entry.residentMail,
        applicants_mail:Array.from(entry.applicantSet).join(','),
        'Date and time':formatDateTimeForRequest(entry.slotId,scheduleWindow.closedate),
        resident_note:entry.residentNote || null,
        location:entry.location || null
    })).filter((row)=>row.resident_mail && row.applicants_mail);
    if(!payload.length){
        hasAttemptedClosedateMerge=false;
        return;
    }
    const {error}=await supabaseClient.from('Requests').upsert(payload,{onConflict:'request_id'});
    if(error){
        hasAttemptedClosedateMerge=false;
        console.error('Failed to merge requests into Supabase Requests table:', error);
    }
}

function buildGrid(){ let html=''; TIME_SLOTS.forEach((slot,idx)=>{ html += `<tr><td class='time-col'>${slot.s}<br>${slot.e}</td>`; DAYS.forEach(day=>{ const id=`${day.toUpperCase()} - ${slot.s}`; html += `<td><div class='slot unavailable' id='${id}' data-idx='${idx}'></div></td>`; }); html+='</tr>';}); document.getElementById('grid-body').innerHTML=html; }

function requestsOfApplicant(){ return Object.entries(allRequests).filter(([,r]) => (r.applicant_name||'')===applicantName); }

function updateCounters(){ const reqs=requestsOfApplicant().map(([,r])=>r); const sent=reqs.filter(r=>['pending','approved','completed'].includes((r.status||'').toLowerCase())).length; const completed=reqs.filter(r=>(r.status||'').toLowerCase()==='completed').length; const quotaLeft=Math.max(applicantQuota-completed,0); document.getElementById('requestsSentCounter').textContent=`Requests Sent: ${sent}`; document.getElementById('quotaCounter').textContent=`Quota Left: ${quotaLeft}/${applicantQuota}`; }

function renderGrid(){ document.querySelectorAll('.slot').forEach(el=>{ el.className='slot unavailable'; el.textContent=''; el.innerHTML=''; });
const filtered=requestsOfApplicant().filter(([,r])=> selectedStatus==='all' || (r.status||'').toLowerCase()===selectedStatus);
const countMap={};
filtered.forEach(([id,r])=>{ const status=(r.status||'').toLowerCase(); (r.slot_ids || (r.slot_id?[r.slot_id]:[])).forEach(slotId=>{ const el=document.getElementById(slotId); if(!el)return; el.className=`slot status-${status}`; el.textContent=status.toUpperCase(); el.dataset.requestId=id; if(status==='approved'){ countMap[slotId]=(countMap[slotId]||0)+1; el.onclick=()=>openDetails(id);} else {el.onclick=null;} }); });
Object.entries(countMap).forEach(([slotId,count])=>{ const el=document.getElementById(slotId); if(el) el.insertAdjacentHTML('beforeend',`<span class='slot-counter'>${count}</span>`); });
}

function renderRequestList(){ const list=document.getElementById('request-list'); list.innerHTML='';
const rows=requestsOfApplicant().filter(([,r])=> selectedStatus==='all' || (r.status||'').toLowerCase()===selectedStatus).sort((a,b)=>(b[1].timestamp||0)-(a[1].timestamp||0));
if(!rows.length){ list.innerHTML="<div class='request-card'>No requests in this filter.</div>"; return; }
rows.forEach(([id,r])=>{ const st=(r.status||'unknown').toLowerCase(); const chipColor=st==='approved'?'background:#DCFCE7;color:#166534':st==='pending'?'background:#E2E8F0;color:#334155':st==='completed'?'background:#D1FAE5;color:#065F46':'background:#FCE7F3;color:#9D174D'; const slots=r.slot_ids || (r.slot_id?[r.slot_id]:[]); list.insertAdjacentHTML('beforeend',`<div class='request-card'><div class='row'><div><div style='font-size:14px;font-weight:800'>${r.resident||'N/A'}</div><div style='font-size:12px;color:#64748b'>${formatSlotRange(slots)}</div></div><span class='status-chip' style='${chipColor}'>${st}</span></div><div style='font-size:11px;color:#94a3b8;margin-top:8px;'>${r.timestamp?new Date(r.timestamp).toLocaleString():''}</div></div>`);
});
}

window.openDetails=function(requestId){ const req=allRequests[requestId]; if(!req || (req.status||'').toLowerCase()!=='approved') return; const slots=req.slot_ids || (req.slot_id?[req.slot_id]:[]); const first=getSlotParts(slots[0]||''); document.getElementById('detailsContent').innerHTML=`<p class='meta'><strong>Resident:</strong> ${req.resident||'N/A'}</p><p class='meta'><strong>Location:</strong> ${req.location||'Not specified'}</p><p class='meta'><strong>Applicant:</strong> ${req.applicant_name||'N/A'}</p><p class='meta'><strong>Date:</strong> ${first?first.day:'N/A'}</p><p class='meta'><strong>Time:</strong> ${formatSlotRange(slots)}</p><p class='meta'><strong>Resident note:</strong> ${req.resident_note || req.note || 'No note.'}</p>`; document.getElementById('detailsOverlay').style.display='flex'; }
window.closeDetails=function(){ document.getElementById('detailsOverlay').style.display='none'; }

async function fetchApplicantQuota(){ const c=getApplicantClassification(); if(!c) return 3; const {data,error}=await supabaseClient.from('Setting').select('Settingtitle, Number'); if(error||!data) return 3; const n=c.toString().trim().toLowerCase(); const m=data.find(r=>normalizeSettingTitle(r['Setting title']||r['Settingtitle'])===n); const q=m?Number(m['Number']):NaN; return Number.isFinite(q)&&q>0?q:3; }

function renderAll(){ updateCounters(); renderGrid(); renderRequestList(); }

document.getElementById('statusFilters').addEventListener('click',(e)=>{ const btn=e.target.closest('.filter-btn'); if(!btn) return; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); selectedStatus=btn.dataset.status; renderAll(); });

buildGrid();
Promise.all([fetchApplicantQuota(), checkMaintenanceSetting()]).then(([q])=>{ applicantQuota=q; });
const requestsRef=ref(db,'requests');
const requestSchedRef=ref(db,'requestsched');
onValue(requestSchedRef,(snap)=>{
    const val=snap.val()||{};
    scheduleWindow.opendate=parseScheduleDate(val.opendate);
    scheduleWindow.closedate=parseScheduleDate(val.closedate);
    if(scheduleWindow.closedate && new Date()>=scheduleWindow.closedate){
        mergeRequestsToSupabaseIfClosed();
    }
});
onValue(requestsRef,(snap)=>{ allRequests=snap.val()||{}; renderAll(); mergeRequestsToSupabaseIfClosed(); document.getElementById('grid-loader').style.display='none'; });
</script>
</body>
</html>
